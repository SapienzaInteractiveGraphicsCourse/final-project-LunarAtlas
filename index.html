<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lunar Atlas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #ccc;
    }
 
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
 
    canvas { display: block; }
 
    /* HUD */
    #hud {
      position: absolute;
      top: 15px;
      left: 15px;
      display: grid;
      grid-template-columns: max-content;
      row-gap: 0px;
      align-items: flex-start;
      padding: 18px 22px;
      background: rgba(0,0,0,0.8);
      border-radius: 18px;
      pointer-events: none;
      user-select: none;
    }
 
    #hud > h1,
    #hud > .control {
      grid-column: 1;
    }
 
    #hud > div:last-child {
      grid-column: 1;
      align-self: start;
    }
 
    #hud h1 {
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,1);
      margin-bottom: 18px;
      font-weight: bold;
    }
 
    #hud .control {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.8);
      line-height: 2;
      font-weight: lighter;
    }

    #hud .control span{
      font-size: 12px;
      letter-spacing: 0.15em;
    }
 
 
    #info {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-align: right;
      font-weight: bold;
      background: rgba(0,0,0,0.8);
      row-gap: 5px;
      padding: 18px 22px;
      border-radius: 18px;
      min-width: 150px;
    }

    #pos-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: rgba(160,175,220,0.8);
      font-size: 10px;
    }
 
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      gap: 16px;
      transition: opacity 0.8s ease;
    }
 
    #loading.hidden { opacity: 0; pointer-events: none; }
 
    #loading p {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: rgba(200,215,255,0.5);
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
 
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(200,215,255,0.1);
      border-top: 1px solid rgba(200,215,255,0.6);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
 
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── 3D Moon Labels ── */
    #label-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .moon-label {
      position: absolute;
      top: 0; left: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      transform-origin: left center;
      white-space: nowrap;
      will-change: transform, opacity;
      transition: opacity 0.12s ease;
    }

    .moon-label__dot {
      flex-shrink: 0;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      border: 1px solid currentColor;
    }

    .moon-label__text {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0,0,0,1), 0 1px 4px rgba(0,0,0,1);
    }

    /* Crater — light cyan, like NASA Trek */
    .moon-label--crater {
      color: rgba(160, 220, 255, 0.92);
    }
    .moon-label--crater .moon-label__dot {
      background: rgba(120, 200, 255, 0.7);
    }

    /* Mare — muted amber/gold */
    .moon-label--mare {
      color: rgba(255, 210, 130, 0.85);
    }
    .moon-label--mare .moon-label__text {
      font-size: 10px;
      letter-spacing: 0.22em;
    }
    .moon-label--mare .moon-label__dot {
      width: 7px; height: 7px;
      background: rgba(255, 200, 80, 0.55);
    }

    /* Apollo landing sites — green */
    .moon-label--landing {
      color: rgba(120, 255, 160, 0.95);
    }
    .moon-label--landing .moon-label__dot {
      width: 6px; height: 6px;
      background: rgba(80, 255, 120, 0.8);
      border-radius: 2px;
    }
    .moon-label--landing .moon-label__text {
      font-size: 8px;
    }

    /* Mountain Range — purple */
    .moon-label--mountain {
      color: rgba(255, 0, 0, 0.95);
    }
    .moon-label--mountain .moon-label__dot {
      width: 6px; height: 6px;
      background: rgba(255, 0, 0, 0.8);
      border-radius: 2px;
    }
    .moon-label--mountain .moon-label__text {
      font-size: 8px;
    }

    /* Valley — light blue */
    .moon-label--valley {
      color: rgba(120, 220, 255, 1);
    }
    .moon-label--valley .moon-label__dot {
      width: 6px; height: 6px;
      background: rgba(120, 220, 255, 1);
      border-radius: 2px;
    }
    .moon-label--valley .moon-label__text {
      font-size: 8px;
    }

  </style>
</head>
<body>
 
<div id="loading">
  <div class="loader-ring"></div>
  <p>Loading Moon</p>
</div>
 
<div id="canvas-container">
  <!-- 3D label overlay — populated by JS -->
  <div id="label-container"></div>

  <div id="hud">
    <h1>Lunar Atlas</h1>
    <div class="control"><span>DRAG</span> Rotate</div>
    <div class="control"><span>SCROLL</span> Zoom</div>
    <div class="control"><span>PRESS "C"</span> Change Camera</div>
    <div id="camera-mode" class="control" style="margin-top:6px; font-size:8px; color:rgba(120,255,160,0.8);">CAMERA: NAVIGATOR</div>
    <div class="control" style="margin-top:10px; font-size:8px; color:rgba(255,255,255,0.4);">
      <span style="color:rgba(160,220,255,0.7);">●</span> Crater &nbsp;
      <span style="color:rgba(255,210,130,0.7);">●</span> Mare &nbsp;
      <span style="color:rgba(120,255,160,0.8);">▪</span> Landing Site &nbsp;
      <span style="color:rgba(255, 0, 0, 0.8);">▲</span> Mountain Range &nbsp;
      <span style="color:rgba(120,220,255,0.8);">▬</span> Valley &nbsp;
    </div>
  </div>

  <div id="info">
    <div id="crater-label"></div>
    <div id="pos-label">
      <span id="lat">0.00°</span>
      <span id="lon">0.00°</span>
    </div>
  </div>
</div>

<script src="./src/main.js" type="module"></script>
